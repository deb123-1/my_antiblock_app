name: iOS Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          
      - run: flutter pub get

      - name: Build iOS for Simulator (Debug)
        run: |
          flutter build ios --debug --simulator --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/iphonesimulator/Payload
          cp -r build/ios/iphonesimulator/Runner.app build/ios/iphonesimulator/Payload/
          cd build/ios/iphonesimulator
          zip -r TelegramAntiBlock.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-AntiBlock-IPA
          path: build/ios/iphonesimulator/TelegramAntiBlock.ipa