- name: Build iOS for Simulator (No Signing Required)
        run: |
          flutter build ios --release --simulator --no-codesign
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

      - name: Create IPA
        run: |
          mkdir -p build/ios/iphonesimulator/Payload
          cp -r build/ios/iphonesimulator/Runner.app build/ios/iphonesimulator/Payload/
          cd build/ios/iphonesimulator
          zip -r TelegramAntiBlock.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-AntiBlock-IPA
          path: build/ios/iphonesimulator/TelegramAntiBlock.ipa
